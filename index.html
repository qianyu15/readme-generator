<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Profile README Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="
        min-h-screen
        bg-[#0d1117]
        text-[#f0f6fc]
        font-sans
        flex
        items-center
        justify-center
        p-6
    "
>

    <main class="w-full max-w-[760px]">

        <h1
            class="
                mb-2
                text-3xl
                font-bold
                tracking-tight
                sm:text-4xl
            "
        >
            Profile README Generator
        </h1>

        <p
            class="
                mb-8
                text-[#8b949e]
            "
        >
            GitHubユーザー名を入力するだけでプロフィールREADMEを生成します。
        </p>

        <form
            id="form"
            class="
                mb-6
                flex
                flex-col
                gap-3
                sm:flex-row
            "
        >

            <input
                id="username"
                type="text"
                placeholder="GitHub username"
                autocomplete="off"
                required
                class="
                    min-w-0
                    flex-1
                    rounded-lg
                    border
                    border-[#30363d]
                    bg-[#161b22]
                    px-4
                    py-3.5
                    text-base
                    text-[#f0f6fc]
                    outline-none
                    placeholder:text-[#8b949e]
                    focus:border-[#58a6ff]
                "
            >

            <button
                type="submit"
                class="
                    rounded-lg
                    bg-[#238636]
                    px-5
                    py-3.5
                    text-sm
                    font-semibold
                    text-white
                    transition
                    hover:bg-[#2ea043]
                    disabled:cursor-not-allowed
                    disabled:opacity-60
                "
            >
                Generate
            </button>

        </form>

        <p
            id="status"
            class="
                mb-4
                min-h-6
                text-[#8b949e]
            "
        ></p>

        <div
            id="actions"
            class="
                mb-6
                hidden
                flex-wrap
                gap-3
            "
        >

            <!-- Copy README -->
            <button
                id="copy"
                type="button"
                aria-label="Copy README"
                title="Copy README"
                class="
                    flex
                    h-11
                    w-11
                    items-center
                    justify-center
                    rounded-lg
                    bg-[#6e40c9]
                    text-white
                    transition
                    hover:bg-[#8957e5]
                    focus:outline-none
                    focus:ring-2
                    focus:ring-[#8957e5]
                "
            >

                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="h-5 w-5"
                    aria-hidden="true"
                >
                    <rect
                        width="14"
                        height="14"
                        x="8"
                        y="8"
                        rx="2"
                        ry="2"
                    />

                    <path
                        d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
                    />
                </svg>

            </button>

            <!-- Download README -->
            <button
                id="download"
                type="button"
                aria-label="Download README.md"
                title="Download README.md"
                class="
                    flex
                    h-11
                    w-11
                    items-center
                    justify-center
                    rounded-lg
                    bg-[#1f6feb]
                    text-white
                    transition
                    hover:bg-[#388bfd]
                    focus:outline-none
                    focus:ring-2
                    focus:ring-[#388bfd]
                "
            >

                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="h-5 w-5"
                    aria-hidden="true"
                >
                    <path
                        d="M12 3v12"
                    />

                    <path
                        d="m7 10 5 5 5-5"
                    />

                    <path
                        d="M5 21h14"
                    />
                </svg>

            </button>

        </div>

        <pre
            id="preview"
            class="
                hidden
                max-h-[600px]
                overflow-auto
                whitespace-pre-wrap
                break-words
                rounded-lg
                border
                border-[#30363d]
                bg-[#161b22]
                p-5
                font-mono
                text-sm
                leading-relaxed
                text-[#c9d1d9]
            "
        ></pre>

    </main>

    <script>

        const form =
            document.querySelector("#form");

        const usernameInput =
            document.querySelector("#username");

        const status =
            document.querySelector("#status");

        const preview =
            document.querySelector("#preview");

        const actions =
            document.querySelector("#actions");

        const copyButton =
            document.querySelector("#copy");

        const downloadButton =
            document.querySelector("#download");

        let generatedReadme =
            "";

        const headers = {

            Accept:
                "application/vnd.github+json",

            "X-GitHub-Api-Version":
                "2022-11-28"

        };

        async function githubApi(
            endpoint
        ) {

            const response =
                await fetch(
                    `https://api.github.com${endpoint}`,
                    {
                        headers
                    }
                );

            if (!response.ok) {

                let message =
                    "GitHub API Error";

                try {

                    const error =
                        await response.json();

                    message =
                        error.message ||
                        message;

                } catch {
                    // JSONではない場合
                }

                throw new Error(
                    `${response.status}: ${message}`
                );

            }

            return response.json();

        }

        function calculateAccountAge(
            createdAt
        ) {

            const created =
                new Date(
                    createdAt
                );

            const now =
                new Date();

            let years =
                now.getFullYear() -
                created.getFullYear();

            const anniversary =
                new Date(
                    now.getFullYear(),
                    created.getMonth(),
                    created.getDate()
                );

            if (
                now <
                anniversary
            ) {

                years--;

            }

            return years;

        }

        async function generateReadme(
            username
        ) {

            const [

                user,

                repositories

            ] = await Promise.all([

                githubApi(
                    `/users/${username}`
                ),

                githubApi(
                    `/users/${username}/repos?per_page=100&sort=updated`
                )

            ]);

            const projects =
                repositories.filter(
                    repository =>
                        !repository.fork
                );

            const languages =
                new Set();

            for (
                const repository
                of projects
            ) {

                const language =
                    repository.language;

                if (
                    language
                ) {

                    languages.add(
                        language
                    );

                }

            }

            const skills =
                [
                    ...languages
                ]

                    .map(
                        language =>
                            `- ${language}`
                    )

                    .join(
                        "\n"
                    );

            const projectsMarkdown =
                projects

                    .map(
                        repository => {

                            const description =
                                repository.description ||
                                "説明なし";

                            return `### ${repository.name}

${description}

[View Repository](${repository.html_url})`;

                        }
                    )

                    .join(
                        "\n\n"
                    );

            const contact = [

                `- GitHub: [${user.login}](${user.html_url})`,

                user.email

                    ? `- Email: ${user.email}`

                    : null

            ]

                .filter(
                    Boolean
                )

                .join(
                    "\n"
                );

            const accountAgeYears =
                calculateAccountAge(
                    user.created_at
                );

            return `# Hi I am ${user.name || user.login}

${user.bio || ""}

I have been on GitHub for ${accountAgeYears} years.

## Skills

${skills || "なし"}

## Projects

${projectsMarkdown || "プロジェクトなし"}

## Contact

${contact}
`;

        }

        form.addEventListener(
            "submit",
            async event => {

                event.preventDefault();

                const username =
                    usernameInput.value.trim();

                if (
                    !username
                ) {

                    return;

                }

                status.textContent =
                    "GitHubからプロフィールを取得中...";

                status.classList.remove(
                    "text-[#f85149]"
                );

                preview.classList.add(
                    "hidden"
                );

                actions.classList.add(
                    "hidden"
                );

                generatedReadme =
                    "";

                try {

                    generatedReadme =
                        await generateReadme(
                            username
                        );

                    preview.textContent =
                        generatedReadme;

                    preview.classList.remove(
                        "hidden"
                    );

                    actions.classList.remove(
                        "hidden"
                    );

                    actions.classList.add(
                        "flex"
                    );

                    status.textContent =
                        "README.mdを生成しました。";

                } catch (
                    error
                ) {

                    status.textContent =
                        error.message;

                    status.classList.add(
                        "text-[#f85149]"
                    );

                }

            }
        );

        copyButton.addEventListener(
            "click",
            async () => {

                try {

                    await navigator.clipboard.writeText(
                        generatedReadme
                    );

                    copyButton.innerHTML = `

                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="h-5 w-5"
                            aria-hidden="true"
                        >

                            <path
                                d="m5 12 5 5L20 7"
                            />

                        </svg>

                    `;

                    copyButton.setAttribute(
                        "aria-label",
                        "Copied"
                    );

                    copyButton.setAttribute(
                        "title",
                        "Copied"
                    );

                    setTimeout(
                        () => {

                            copyButton.innerHTML = `

                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="h-5 w-5"
                                    aria-hidden="true"
                                >

                                    <rect
                                        width="14"
                                        height="14"
                                        x="8"
                                        y="8"
                                        rx="2"
                                        ry="2"
                                    />

                                    <path
                                        d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
                                    />

                                </svg>

                            `;

                            copyButton.setAttribute(
                                "aria-label",
                                "Copy README"
                            );

                            copyButton.setAttribute(
                                "title",
                                "Copy README"
                            );

                        },
                        2000
                    );

                } catch {

                    status.textContent =
                        "コピーに失敗しました。";

                    status.classList.add(
                        "text-[#f85149]"
                    );

                }

            }
        );

        downloadButton.addEventListener(
            "click",
            () => {

                const blob =
                    new Blob(
                        [
                            generatedReadme
                        ],
                        {
                            type:
                                "text/markdown;charset=utf-8"
                        }
                    );

                const url =
                    URL.createObjectURL(
                        blob
                    );

                const anchor =
                    document.createElement(
                        "a"
                    );

                anchor.href =
                    url;

                anchor.download =
                    "README.md";

                anchor.click();

                URL.revokeObjectURL(
                    url
                );

            }
        );

    </script>

</body>
</html>
