<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GitHub README Generator</title>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: 40px auto;
}

input, button {
  padding: 10px;
  width: 100%;
  margin: 5px 0;
}

.card {
  border: 1px solid #ddd;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
}

pre {
  background:#111;
  color:white;
  padding:20px;
  white-space:pre-wrap;
}
</style>

</head>

<body>

<h1>GitHub README Generator</h1>

<input id="user" placeholder="GitHub username">

<button onclick="loadRepos()">
取得
</button>

<div id="projects"></div>

<h2>Generated README</h2>
<pre id="readme"></pre>


<script>

async function loadRepos(){

const username =
document.getElementById("user").value;


const res = await fetch(
`https://api.github.com/users/${username}/repos?per_page=100`
);


const repos = await res.json();


const projects =
repos
.filter(repo => !repo.fork)
.map(repo => {

return {
name: repo.name,
desc: repo.description || "No description",
lang: repo.language || "Unknown",
stars: repo.stargazers_count,
url: repo.html_url
}

});


render(projects);

generateReadme(projects);

}



function render(projects){

document.getElementById("projects").innerHTML =
projects.map(p=>`

<div class="card">

<h3>
${p.name}
</h3>

<p>
${p.desc}
</p>

<p>
Language: ${p.lang}
</p>

<p>
⭐ ${p.stars}
</p>

<a href="${p.url}">
GitHub
</a>

</div>

`).join("");

}



function generateReadme(projects){

const md =
`
# Projects

${projects.map(p=>`

## ${p.name}

${p.desc}

- Language: ${p.lang}
- ⭐ Stars: ${p.stars}

[Repository](${p.url})

`).join("\n")}

`;


document.getElementById("readme").textContent = md;

}

</script>

</body>
</html>
